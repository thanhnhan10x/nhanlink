<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NhanLink - Chuyển đổi link Shopee Affiliate</title>

    <meta name="description"
        content="NhanLink - Công cụ chuyển đổi link Shopee Affiliate nhanh chóng, miễn phí và đơn giản.">

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <div class="background"></div>

    <main class="container">

        <!-- Logo -->

        <div class="logo">

            <div class="logo-icon">🔗</div>

            <h1>NhanLink</h1>

            <p>Chuyển đổi link Shopee Affiliate</p>

        </div>

        <!-- Card -->

        <section class="card">

            <label>Nhập link Shopee</label>

            <div class="input-box">

                <input type="text"
                    id="link"
                    placeholder="https://shopee.vn/...">

            </div>

            <button onclick="createLink()" class="btn">

                Chuyển đổi ngay

            </button>

            <div id="loading" class="loading">

                <div class="spinner"></div>

                <span>Đang chuyển đổi...</span>

            </div>

        </section>

        <!-- Result -->

        <section class="result-card">

            <div class="result-title">

                Link Affiliate

            </div>

            <textarea
                id="result"
                readonly
                placeholder="Link sau khi chuyển đổi sẽ hiển thị tại đây..."></textarea>

            <div class="button-group">

                <button class="copy-btn" onclick="copyLink()">

                    Copy

                </button>

                <button class="open-btn" onclick="openLink()">

                    Mua ngay

                </button>

            </div>

        </section>

        <!-- Guide -->

        <section class="guide">

            <h2>Hướng dẫn sử dụng</h2>

            <div class="steps">

                <div class="step">

                    <span>1</span>

                    <p>Dán link Shopee</p>

                </div>

                <div class="step">

                    <span>2</span>

                    <p>Nhấn Chuyển đổi</p>

                </div>

                <div class="step">

                    <span>3</span>

                    <p>Copy và chia sẻ</p>

                </div>

            </div>

        </section>

        <!-- Footer -->

        <footer>

            © 2026 NhanLink

        </footer>

    </main>

    <div id="toast"></div>

    <script src="script.js"></script>

</body>

</html>
